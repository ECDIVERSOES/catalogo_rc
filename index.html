<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="Catálogo rodrigo okê">
    <meta property="og:description" content="Explore nosso catálogo completo de músicas para karaokê e divirta-se cantando!">
    <meta property="og:image" content="https://i.postimg.cc/zGgC8L0b/IMG-20250302-212454-732.webp">
    <meta property="og:url" content="https://ecdiversoes.github.io/catalogo_rc/">
    <title>Catálogo rodrigo okê</title>
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="apple-touch-icon" href="icon-310x310.png">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Espaçador para manter a altura original do título */
        .titulo-espacador {
            height: 48px;
            margin: 0;
            visibility: hidden;
        }
        
        @media (max-width: 480px) {
            .titulo-espacador {
                height: 40px;
            }
        }
        
        /* Estilos para os botões de filtro rápido - BARRA FIXA MAIS BAIXA */
        .filtros-rapidos {
            position: fixed;
            top: 150px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 8px 10px;
            background-color: #0a0a0a;
            z-index: 999;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }
        
        .btn-filtro {
            padding: 8px 22px;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #2a2a3a;
            color: #FFFFFF;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        .btn-filtro:hover {
            transform: scale(1.05);
        }
        
        .btn-filtro.todas {
            background-color: #4dabf7;
            color: #000000;
        }
        
        .btn-filtro.todas:hover {
            background-color: #3a8fd6;
        }
        
        .btn-filtro.gospel {
            background-color: #2a2a3a;
            border: 1px solid #FFD700;
            color: #FFD700;
        }
        
        .btn-filtro.gospel:hover {
            background-color: #FFD700;
            color: #000000;
        }
        
        .btn-filtro.kpop {
            background-color: #2a2a3a;
            border: 1px solid #FF69B4;
            color: #FF69B4;
        }
        
        .btn-filtro.kpop:hover {
            background-color: #FF69B4;
            color: #000000;
        }
        
        /* Estilos para o botão Infantil */
        .btn-filtro.infantil {
            background-color: #2a2a3a;
            border: 1px solid #00CED1;
            color: #00CED1;
        }
        
        .btn-filtro.infantil:hover {
            background-color: #00CED1;
            color: #000000;
        }
        
        .btn-filtro.ativo {
            background-color: #FFD700;
            color: #000000;
            border: 1px solid #FFD700;
        }
        
        .btn-filtro.kpop.ativo {
            background-color: #FF69B4;
            color: #000000;
            border: 1px solid #FF69B4;
        }
        
        .btn-filtro.infantil.ativo {
            background-color: #00CED1;
            color: #000000;
            border: 1px solid #00CED1;
        }
        
        /* Ajuste da área rolável */
        .conteudo-rolavel {
            position: fixed;
            top: 175px;
            bottom: 60px;
            left: 0;
            right: 0;
            width: 100%;
            margin: 0;
            overflow-y: auto;
            padding: 0px;
        }
        
        @media (max-width: 480px) {
            .filtros-rapidos {
                top: 115px;
                padding: 6px 10px;
                gap: 6px;
            }
            
            .btn-filtro {
                padding: 5px 14px;
                font-size: 11px;
            }
            
            .conteudo-rolavel {
                top: 158px;
                bottom: 55px;
            }
        }
    </style>
</head>
<body>

<div class="rodape">
    <div class="rodape-mensagem">
        <span>🎵 Não encontrou a canção? Mande seu pedido! 🎵</span>
    </div>
    <button class="botao-pedido" onclick="enviarPedidoWhatsApp()">
        <i class="fab fa-whatsapp"></i> Solicitar Música
    </button>
</div>

<button class="share-button" onclick="compartilharWhatsApp()">
    &#x21AA;
    <span class="fallback-text"></span>
</button>

<div class="cabecalho-fixo">
    <!-- ESPAÇADOR INVISÍVEL PARA MANTER A ALTURA ORIGINAL -->
    <div class="titulo-espacador"></div>
    
    <input type="search" id="pesquisa" placeholder="🔍 Pesquise sua música aqui">
    <div id="resultado-pesquisa" class="resultado-pesquisa"></div>
    <div id="aviso"></div>
    <a href="favoritos.html" class="favoritos-link">
        <span class="heart">❤️</span>
        <span class="text">Favoritos</span>
        <span class="counter">0</span>
    </a>
    <a href="vendas.html" class="vendas-button">
        <i class="fas fa-shopping-cart"></i>
    </a>
    <a href="nova_tela.html" class="help-button">?</a>
    <div class="controles-paginacao">
        <button id="anterior">&#9664;</button>
        <span id="info-paginacao"> 1 de 1</span>
        <button id="proximo">&#9654;</button>
    </div>
</div>

<!-- BARRA FIXA DOS BOTÕES DE FILTRO -->
<div class="filtros-rapidos">
    <button id="btn-todas" class="btn-filtro todas ativo">📋 TODAS</button>
    <button id="btn-gospel" class="btn-filtro gospel">✝️ GOSPEL</button>
    <button id="btn-kpop" class="btn-filtro kpop">🇰🇷 K-POP</button>
    <button id="btn-infantil" class="btn-filtro infantil">🧸 INFANTIL</button>
</div>

<div class="conteudo-rolavel">
    <div id="catalogo" class="lista-simples"></div>
</div>

<script src="script.js"></script>

<script>
    // Funções para os botões de filtro rápido
    const btnTodas = document.getElementById('btn-todas');
    const btnGospel = document.getElementById('btn-gospel');
    const btnKpop = document.getElementById('btn-kpop');
    const btnInfantil = document.getElementById('btn-infantil');
    const pesquisaInput = document.getElementById('pesquisa');
    
    function filtrarPorGenero(genero) {
        // Limpa a pesquisa
        if (pesquisaInput) {
            pesquisaInput.value = '';
            sessionStorage.removeItem('termoPesquisaIndex');
        }
        
        // Dispara o filtro no script principal
        if (typeof window.filtrarPorGeneroExterno === 'function') {
            window.filtrarPorGeneroExterno(genero);
        } else {
            const event = new CustomEvent('filtroGenero', { detail: { genero: genero } });
            window.dispatchEvent(event);
        }
        
        // Atualiza estilo dos botões
        if (genero === 'todas') {
            btnTodas.classList.add('ativo');
            btnGospel.classList.remove('ativo');
            btnKpop.classList.remove('ativo');
            btnInfantil.classList.remove('ativo');
        } else if (genero === 'gospel') {
            btnGospel.classList.add('ativo');
            btnTodas.classList.remove('ativo');
            btnKpop.classList.remove('ativo');
            btnInfantil.classList.remove('ativo');
        } else if (genero === 'kpop') {
            btnKpop.classList.add('ativo');
            btnTodas.classList.remove('ativo');
            btnGospel.classList.remove('ativo');
            btnInfantil.classList.remove('ativo');
        } else if (genero === 'infantil') {
            btnInfantil.classList.add('ativo');
            btnTodas.classList.remove('ativo');
            btnGospel.classList.remove('ativo');
            btnKpop.classList.remove('ativo');
        }
    }
    
    if (btnTodas) {
        btnTodas.addEventListener('click', () => filtrarPorGenero('todas'));
    }
    
    if (btnGospel) {
        btnGospel.addEventListener('click', () => filtrarPorGenero('gospel'));
    }
    
    if (btnKpop) {
        btnKpop.addEventListener('click', () => filtrarPorGenero('kpop'));
    }
    
    if (btnInfantil) {
        btnInfantil.addEventListener('click', () => filtrarPorGenero('infantil'));
    }

    // ============================================
    // SERVICE WORKER - MÉTODO 2 (VERIFICAÇÃO DIRETA)
    // ============================================

    let redirecionamentoRealizado = false;
    const VERSAO_ATUAL = 'karaoke-cache-1.6'; // MANTENHA IGUAL AO SERVICE-WORKER.JS

    // Função para verificar versão no service-worker.js
    async function verificarVersaoServidor() {
        if (redirecionamentoRealizado) return false;
        
        try {
            // Busca o service-worker.js com timestamp para evitar cache
            const response = await fetch('./service-worker.js?t=' + Date.now());
            const swContent = await response.text();
            
            // Extrai a versão do arquivo
            const versaoMatch = swContent.match(/CACHE_NAME\s*=\s*['"]([^'"]+)['"]/);
            
            if (versaoMatch && versaoMatch[1]) {
                const versaoServidor = versaoMatch[1];
                console.log('[VERIFICAÇÃO] Versão no servidor:', versaoServidor);
                console.log('[VERIFICAÇÃO] Versão atual na página:', VERSAO_ATUAL);
                
                // Se as versões são diferentes, redireciona
                if (versaoServidor !== VERSAO_ATUAL) {
                    console.log('[VERIFICAÇÃO] ✅ VERSÃO DIFERENTE DETECTADA! Redirecionando...');
                    redirecionamentoRealizado = true;
                    
                    // Extrai também data e novas músicas do SW
                    const dataMatch = swContent.match(/DATA_ATUALIZACAO\s*=\s*['"]([^'"]+)['"]/);
                    const novasMatch = swContent.match(/NOVAS_CANCOES\s*=\s*['"]([^'"]+)['"]/);
                    
                    const dataAtualizacao = dataMatch ? dataMatch[1] : '04 de Maio 2026';
                    const novasCancoes = novasMatch ? novasMatch[1] : '+500';
                    
                    // Salva a nova versão no localStorage
                    localStorage.setItem('ultimaVersao', versaoServidor);
                    
                    // Redireciona para página de atualização
                    window.location.href = `./atualizacao.html?novas=${encodeURIComponent(novasCancoes)}&data=${encodeURIComponent(dataAtualizacao)}`;
                    return true;
                }
            } else {
                console.log('[VERIFICAÇÃO] Não foi possível encontrar a versão no service-worker.js');
            }
        } catch (error) {
            console.log('[VERIFICAÇÃO] Erro ao buscar service-worker.js:', error);
        }
        return false;
    }

    // Registra o Service Worker
    if ('serviceWorker' in navigator) {
        // Registra com timestamp para evitar cache
        navigator.serviceWorker.register('./service-worker.js?v=' + Date.now())
            .then(registration => {
                console.log('[SW] Service Worker registrado com sucesso');
                
                // Verifica se já existe um worker esperando
                if (registration.waiting && !redirecionamentoRealizado) {
                    console.log('[SW] Worker esperando encontrado');
                    redirecionamentoRealizado = true;
                    window.location.href = './atualizacao.html?novas=+500&data=04%20de%20Maio%202026';
                }
                
                // Detecta quando uma nova versão é encontrada
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    console.log('[SW] Nova versão do Service Worker encontrada!');
                    
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller && !redirecionamentoRealizado) {
                            console.log('[SW] Nova versão instalada e pronta!');
                            redirecionamentoRealizado = true;
                            window.location.href = './atualizacao.html?novas=+500&data=04%20de%20Maio%202026';
                        }
                    });
                });
            })
            .catch(error => {
                console.log('[SW] Erro ao registrar Service Worker:', error);
            });
        
        // Escuta mensagens do Service Worker
        navigator.serviceWorker.addEventListener('message', (event) => {
            console.log('[SW] Mensagem recebida do Service Worker:', event.data);
            
            if (event.data && event.data.type === 'FORCE_REDIRECT' && !redirecionamentoRealizado) {
                console.log('[SW] FORCE_REDIRECT recebido');
                redirecionamentoRealizado = true;
                window.location.href = `./atualizacao.html?novas=${event.data.data.novasCancoes}&data=${encodeURIComponent(event.data.data.dataAtualizacao)}`;
            }
        });
    } else {
        console.log('[SW] Service Worker não é suportado neste navegador');
    }
    
    // ============================================
    // VERIFICAÇÃO PERIÓDICA ATIVA
    // ============================================
    
    // Verifica a cada 15 segundos (mais frequente)
    setInterval(() => {
        verificarVersaoServidor();
    }, 15000);
    
    // Verifica quando a página ganha foco
    window.addEventListener('focus', () => {
        console.log('[VERIFICAÇÃO] Página focada, verificando versão...');
        verificarVersaoServidor();
    });
    
    // Verificação inicial após 2 segundos
    setTimeout(() => {
        verificarVersaoServidor();
    }, 2000);
    
    // Verificação após 500ms (mais rápida)
    setTimeout(() => {
        verificarVersaoServidor();
    }, 500);
    
    // Exibe a versão atual no console para debug
    console.log('[INICIADO] Versão atual do catálogo:', VERSAO_ATUAL);
    console.log('[INICIADO] Sistema de atualização automática ativo (verificação a cada 15 segundos)');
</script>

</body>
</html>
